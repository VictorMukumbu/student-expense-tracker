<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Student Expense Tracker</h1>
      <p>Track your daily spending in KES.</p>
    </header>

    <section class="card">
      <h2>Add Expense</h2>

      <div class="form-row">
        <div class="field">
          <label for="expenseName">Expense</label>
          <input id="expenseName" type="text" placeholder="e.g. Lunch" />
        </div>

        <div class="field">
          <label for="expenseAmount">Amount (KES)</label>
          <input id="expenseAmount" type="number" placeholder="e.g. 150" />
        </div>

        <div class="field">
          <label for="expenseCategory">Category</label>
          <select id="expenseCategory">
            <option value="">Select category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Airtime/Data">Airtime/Data</option>
            <option value="Bills">Bills</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <button id="addExpenseBtn" class="btn" type="button">Add Expense</button>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>Expenses</h2>
        <h3 class="total">Total: <span id="totalAmount">KES 0.00</span></h3>
      </div>

      <ul id="expenseList" class="list">
        <!-- expenses will appear here -->
      </ul>
    </section>

    <section class="card">
      <h2>Category Totals</h2>
      <ul id="categoryTotals" class="list">
        <li>
          <span class="name">Food</span>
          <span class="amount" id="foodTotal">KES 0.00</span>
        </li>
        <li>
          <span class="name">Transport</span>
          <span class="amount" id="transportTotal">KES 0.00</span>
        </li>
        <li>
          <span class="name">Airtime/Data</span>
          <span class="amount" id="airtimeTotal">KES 0.00</span>
        </li>
        <li>
          <span class="name">Bills</span>
          <span class="amount" id="billsTotal">KES 0.00</span>
        </li>
        <li>
          <span class="name">Other</span>
          <span class="amount" id="otherTotal">KES 0.00</span>
        </li>
      </ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
